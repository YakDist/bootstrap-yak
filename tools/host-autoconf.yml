sources:
- name: gnuconfig
  subdir: 'ports'
  git: 'https://https.git.savannah.gnu.org/git/config.git'
  branch: master
  commit: 'a2287c3041a3f2a204eb942e09c015eab00dc7dd'
  version: '20250710'

- name: gnulib
  subdir: 'ports'
  git: 'https://github.com/coreutils/gnulib.git'
  commit: '0a12ab6c8564f4a2980c5fc3b6ab7cd1a6ff262c'
  branch: 'master'
  version: '20260228'

- name: autoconf-archive
  subdir: ports
  url: "https://ftp.gnu.org/gnu/autoconf-archive/autoconf-archive-2022.09.03.tar.xz"
  checksum: "blake2b:9511b1bd2afee78209261d9757c3fc6bf079eb6ea82bc039530532cfaaea8a7d977f6310265c0af2fde377edc9bddfcabf1e81c426a9716d5bf4b4eb7bb64a4a"
  format: "tar.xz"
  extract_path: "autoconf-archive-2022.09.03"
  version: "2022.09.03"

- name: libtool
  subdir: 'ports'
  git: 'https://https.git.savannah.gnu.org/git/libtool.git'
  tag: 'v2.5.4'
  version: '2.5.4'
  sources_required:
    - gnulib
  tools_required:
    - host-autoconf-v2.69
    - host-automake-v1.15
  regenerate:
    - args: ['git', 'submodule', 'deinit', 'gnulib']
    - args: ['python3', '@SOURCE_ROOT@/scripts/checkout-gnulib.py', '@SOURCE_ROOT@/ports/gnulib']
    - args: ['./bootstrap', '--gnulib-srcdir=gnulib', '--skip-git']
      isolate_network: false
    - args: ['cp',
        '@BUILD_ROOT@/tools/host-automake-v1.15/share/automake-1.15/config.sub',
        '@THIS_SOURCE_DIR@/build-aux/']
    - args: ['cp',
        '@BUILD_ROOT@/tools/host-automake-v1.15/share/automake-1.15/config.guess',
        '@THIS_SOURCE_DIR@/build-aux/']

tools:
- name: host-libtool
  architecture: noarch
  exports_aclocal: true
  from_source: libtool
  tools_required:
    - host-autoconf-v2.69
    - host-automake-v1.15
  revision: 1
  configure:
    - args: ['@THIS_SOURCE_DIR@/configure', '--prefix=@PREFIX@']
  compile:
    - args: ['make', '-j@PARALLELISM@']
  install:
    - args: ['make', 'install']

- name: host-automake-v1.15
  architecture: noarch
  source:
    name: automake-v1.15
    version: 1.15.1
    tag: 'v1.15.1'
    subdir: 'ports'
    git: 'https://https.git.savannah.gnu.org/git/automake.git'
    sources_required:
      - gnuconfig
      - gnulib
    tools_required:
      - host-autoconf-v2.69
    regenerate:
      - args: ['cp', '@SOURCE_ROOT@/ports/gnuconfig/config.sub', '@THIS_SOURCE_DIR@/lib/']
      - args: ['cp', '@SOURCE_ROOT@/ports/gnuconfig/config.guess', '@THIS_SOURCE_DIR@/lib/']
      - args: ['python3', '@SOURCE_ROOT@/scripts/checkout-gnulib.py', '@SOURCE_ROOT@/ports/gnulib']
      - args: ['./bootstrap']
  tools_required:
    - host-autoconf-v2.69
  revision: 1
  configure:
      - args:
          - '@THIS_SOURCE_DIR@/configure'
          - '--prefix=@PREFIX@'
          - 'MAKEINFO=/bin/true'
  compile:
      - args: ['make', '-j@PARALLELISM@']
  install:
      - args: ['make', 'install']
      # Stop aclocal from complaining
      - args: ['ln', '-sf', '@PREFIX@/share/aclocal-1.15', '@PREFIX@/share/aclocal']

- name: host-autoconf-v2.69
  architecture: noarch
  source:
    name: autoconf-v2.69
    subdir: 'ports'
    url: 'https://ftpmirror.gnu.org/gnu/autoconf/autoconf-2.69.tar.xz'
    format: 'tar.xz'
    checksum: blake2b:71d33d72a06e9a05fbed0eda73bc9d8a3805c7c90bf082959862f93f3c5f01192114176e84d84ecb58fa99512eafbc0ab21ad1407be18c8c63bb3dc1117c482d
    extract_path: 'autoconf-2.69'
    version: '2.69'
  revision: 1
  configure:
  - args: [ "@THIS_SOURCE_DIR@/configure", "--prefix=@PREFIX@" ]
  compile:
  - args: [ "make", "-j@PARALLELISM@" ]
  install:
  - args: [ "make", "-j@PARALLELISM@", "install" ]


- name: host-autoconf-v2.72
  architecture: noarch
  source:
    name: autoconf-v2.72
    subdir: 'ports'
    git: 'https://https.git.savannah.gnu.org/git/autoconf.git'
    tag: 'v2.72'
    version: '2.72'
    sources_required:
      - gnuconfig
      - gnulib
    regenerate:
      - args: ['cp', '@SOURCE_ROOT@/ports/gnuconfig/config.sub', '@THIS_SOURCE_DIR@/lib/']
      - args: ['cp', '@SOURCE_ROOT@/ports/gnuconfig/config.guess', '@THIS_SOURCE_DIR@/lib/']
      - args: ['python3', '@SOURCE_ROOT@/scripts/checkout-gnulib.py', "@SOURCE_ROOT@/ports/gnulib"]
      - args: ['autoreconf', '-fvi']
  revision: 1
  configure:
  - args: [ "@THIS_SOURCE_DIR@/configure", "--prefix=@PREFIX@" ]
  compile:
  - args: [ "make", "-j@PARALLELISM@" ]
  install:
  - args: [ "make", "-j@PARALLELISM@", "install" ]

- name: host-autoconf-archive
  architecture: noarch
  exports_aclocal: true
  from_source: autoconf-archive
  install:
  - args: [ "mkdir", "-p", "@BUILD_ROOT@/tools/host-autoconf-archive/share/" ]
  - args: [ "cp", "-r", "@THIS_SOURCE_DIR@/m4", "@BUILD_ROOT@/tools/host-autoconf-archive/share/aclocal" ]
