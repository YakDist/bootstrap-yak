sources:
  - name: binutils
    subdir: 'ports'
    url: "https://ftp.gnu.org/gnu/binutils/binutils-2.45.1.tar.xz"
    format: 'tar.xz'
    checksum: 'blake2b:1ccab38659ec47f9100b61322627345fe79ebd04ed0b1e872c988edded4d292d7c9ac33d9f6ea47bf265ec823dfba60da0e84374900c15ec89e3aa9280ac020c'
    version: 2.45.1
    extract_path: "binutils-2.45.1"
    patch-path-strip: 1
    tools_required:
      - host-autoconf-v2.69
      - host-automake-v1.15
      - host-libtool
    regenerate:
      - args: [ "autoreconf", "-fvi", "-Iconfig" ]
      - args: [ "cp", "-pv", "@BUILD_ROOT@/tools/host-libtool/share/libtool/build-aux/config.sub", "." ]
      - args: [ "cp", "-pv", "@BUILD_ROOT@/tools/host-libtool/share/libtool/build-aux/config.guess", "." ]
      - args: [ "cp", "-pv", "@BUILD_ROOT@/tools/host-libtool/share/libtool/build-aux/config.sub", "libiberty/" ]
      - args: [ "cp", "-pv", "@BUILD_ROOT@/tools/host-libtool/share/libtool/build-aux/config.guess", "libiberty/" ]
      - args: [ "cp", "-pv", "@BUILD_ROOT@/tools/host-libtool/share/libtool/build-aux/install-sh", "libiberty/" ]

tools:
  - name: cross-binutils
    architecture: '@OPTION:arch@'
    from_source: binutils
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--with-pkgversion=yak'
        - '--with-bugurl=https://codeberg.org/YakDist/bootstrap-yak/issues/'
        - '--prefix=@PREFIX@'
        - '--target=@OPTION:arch-triple@'
        - '--with-sysroot=@SYSROOT_DIR@'
        # On recent compilers, binutils 2.26 causes implicit-fallthrough warnings, among others.
        - '--disable-werror'
        - '--disable-gdb'
        # -g blows up the binary size.
        - 'CFLAGS=-O2'
    compile:
      - args: ['make', '-j@PARALLELISM@', 'all-binutils', 'all-gas', 'all-ld']
    install:
      - args: ['make', 'install-binutils', 'install-gas', 'install-ld']
      - args: |
          for f in @PREFIX@/bin/@OPTION:arch-triple@-*; do
            tf=$(basename $f | sed 's/@OPTION:arch-triple@/@OPTION:arch-triple@-kernel/')
            ln -sf $(basename $f) @PREFIX@/bin/$tf
          done
