sources:
  - name: pkgconf
    subdir: ports
    url: "https://distfiles.ariadne.space/pkgconf/pkgconf-2.3.0.tar.xz"
    checksum: "blake2b:cca3476df0b79cdbca798ed3a067611414e9b422e8347d0f490e7c4d0c43cdd2c7b586ac11e028a8df365d4ea4194f46b1d9fc0acd0f5fd6b4a5548673a8f853"
    format: "tar.xz"
    extract_path: "pkgconf-2.3.0"
    version: "2.3.0"

  - name: 'pkg-config'
    subdir: 'ports'
    git: 'https://gitlab.freedesktop.org/pkg-config/pkg-config.git'
    tag: 'pkg-config-0.29.2'
    version: '0.29.2'
    tools_required:
      - host-autoconf-v2.69
      - host-automake-v1.15
      - host-libtool
    regenerate:
      - args: ['./autogen.sh']
        environ:
          'NOCONFIGURE': 'yes'

tools:
  - name: host-pkg-config
    architecture: noarch
    exports_aclocal: true
    from_source: pkg-config
    revision: 2
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--prefix=@PREFIX@'
        - '--with-internal-glib'
    compile:
      - args: ['make', '-j@PARALLELISM@']
    install:
      - args: ['make', 'install']

  - name: host-pkgconf
    architecture: noarch
    from_source: pkgconf
    exports_aclocal: true
    revision: 3
    configure:
      - args:
          - "@THIS_SOURCE_DIR@/configure"
          - "--prefix=@PREFIX@"
          - "--with-system-libdir=@SYSROOT_DIR@/usr/lib"
          - "--with-system-includedir=@SYSROOT_DIR@/usr/include"
    compile:
      - args: ["make", "-j@PARALLELISM@"]
    install:
      - args: ["make", "install"]
      - args: ['ln', '-svf', pkgconf, '@PREFIX@/bin/pkg-config']
