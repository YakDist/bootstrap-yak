sources:
  - name: yak
    subdir: 'ports'
    git: 'https://codeberg.org/YakDist/yak.git'
    branch: main
    rolling_version: true
    version: "0.0pl@ROLLING_ID@"
  - name: freestnd-c-hdrs
    subdir: 'ports'
    git: 'https://codeberg.org/OSDev/freestnd-c-hdrs.git'
    branch: trunk
    rolling_version: true
    version: "0.0pl@ROLLING_ID@"
  - name: freestnd-cxx-hdrs
    subdir: 'ports'
    git: 'https://codeberg.org/OSDev/freestnd-cxx-hdrs.git'
    branch: trunk
    rolling_version: true
    version: "0.0pl@ROLLING_ID@"

packages:
  - name: freestnd-c-hdrs
    architecture: "@OPTION:arch@"
    from_source: freestnd-c-hdrs
    revision: 1
    build:
      - args: ["make", "-C", "@THIS_SOURCE_DIR@", "install"]
        environ:
          DESTDIR: "@THIS_COLLECT_DIR@"
      - args: ['ln', '-srf', '@THIS_COLLECT_DIR@/usr/lib/pkgconfig/freestnd-c-hdrs-@OPTION:arch@.pc', '@THIS_COLLECT_DIR@/usr/lib/pkgconfig/freestnd-c-hdrs.pc']
  - name: freestnd-cxx-hdrs
    architecture: "noarch"
    from_source: freestnd-cxx-hdrs
    revision: 1
    build:
      - args: ["make", "-C", "@THIS_SOURCE_DIR@", "install"]
        environ:
          DESTDIR: "@THIS_COLLECT_DIR@"
      - args: ['ln', '-srf', '@THIS_COLLECT_DIR@/usr/lib/pkgconfig/freestnd-cxx-hdrs-@OPTION:arch@.pc', '@THIS_COLLECT_DIR@/usr/lib/pkgconfig/freestnd-cxx-hdrs.pc']

  - name: yak
    architecture: "@OPTION:arch@"
    from_source: yak
    revision: 1
    tools_required:
      - host-llvm
      - host-pkgconf
      - host-cmake
    pkgs_required:
      - freestnd-c-hdrs
      - freestnd-cxx-hdrs
      - frigg
    configure:
      - args:
          - 'cmake'
          - '-DCMAKE_TOOLCHAIN_FILE=@SOURCE_ROOT@/support/CMakeToolchain-@OPTION:arch-triple@-clang.txt'
          - '-DCMAKE_INSTALL_PREFIX=/usr'
          - '-DCMAKE_BUILD_TYPE=Debug'
          - '-DCMAKE_COLOR_DIAGNOSTICS=ON'
          - '-DCMAKE_C_COMPILER_WORKS=1'
          - '-DCMAKE_CXX_COMPILER_WORKS=1'
          - '-GNinja'
          - '@THIS_SOURCE_DIR@'
    build:
      - args: ["ninja"]
      - args: ["ninja", "install"]
        environ:
          DESTDIR: "@THIS_COLLECT_DIR@"
