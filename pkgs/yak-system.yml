sources:
  - name: yak
    subdir: 'ports'
    git: 'https://github.com/YakDist/Yak-Kernel.git'
    branch: yak-cpp
    rolling_version: true
    version: "0.0pl@ROLLING_ID@"
    regenerate:
      - args: ['git', 'submodule', 'update', '--init']
        isolate_network: false
  - name: freestnd-c-hdrs
    subdir: 'ports'
    git: 'https://github.com/osdev0/freestnd-c-hdrs.git'
    branch: trunk
    rolling_version: true
    version: "0.0pl@ROLLING_ID@"
  - name: freestnd-cxx-hdrs
    subdir: 'ports'
    git: 'https://github.com/osdev0/freestnd-cxx-hdrs.git'
    branch: trunk
    rolling_version: true
    version: "0.0pl@ROLLING_ID@"

packages:
  - name: freestnd-c-hdrs
    architecture: "@OPTION:arch@"
    from_source: freestnd-c-hdrs
    revision: 1
    build:
      - args: ["make", "-C", "@THIS_SOURCE_DIR@", "install"]
        environ:
          DESTDIR: "@THIS_COLLECT_DIR@"
      - args: ['ln', '-srf', '@THIS_COLLECT_DIR@/usr/lib/pkgconfig/freestnd-c-hdrs-@OPTION:arch@.pc', '@THIS_COLLECT_DIR@/usr/lib/pkgconfig/freestnd-c-hdrs.pc']
  - name: freestnd-cxx-hdrs
    architecture: "noarch"
    from_source: freestnd-cxx-hdrs
    revision: 1
    build:
      - args: ["make", "-C", "@THIS_SOURCE_DIR@", "install"]
        environ:
          DESTDIR: "@THIS_COLLECT_DIR@"
      - args: ['ln', '-srf', '@THIS_COLLECT_DIR@/usr/lib/pkgconfig/freestnd-cxx-hdrs-@OPTION:arch@.pc', '@THIS_COLLECT_DIR@/usr/lib/pkgconfig/freestnd-cxx-hdrs.pc']

  - name: yak
    architecture: "@OPTION:arch@"
    from_source: yak
    revision: 1
    tools_required:
      - host-llvm
      - host-pkgconf
      - host-cmake
    pkgs_required:
      - freestnd-c-hdrs
      - freestnd-cxx-hdrs
      - frigg
    configure:
      - args:
          - 'cmake'
          - '-DYAK_ARCH=@OPTION:arch@'
          - '-DYAK_TOOLCHAIN=clang'
          - '-DCMAKE_INSTALL_PREFIX=/usr'
          - '-DCMAKE_BUILD_TYPE=None'
          - '-DCMAKE_COLOR_DIAGNOSTICS=ON'
          - '-GNinja'
          - '@THIS_SOURCE_DIR@'
    build:
      - args: ["ninja"]
      - args: ["ninja", "install"]
        environ:
          DESTDIR: "@THIS_COLLECT_DIR@"

  - name: yak-init
    architecture: "@OPTION:arch@"
    revision: 1
    source:
      subdir: .
    tools_required:
      - host-cmake
      - host-gcc
    pkgs_required:
      - mlibc
    configure:
      - args:
          - 'cmake'
          - '-DCMAKE_INSTALL_PREFIX=/usr'
          - '-DCMAKE_TOOLCHAIN_FILE=@SOURCE_ROOT@/support/CMakeToolchain-@OPTION:arch-triple@.txt'
          - '-DCMAKE_COLOR_DIAGNOSTICS=ON'
          - '-GNinja'
          - '@THIS_SOURCE_DIR@'
    build:
      - args: ["ninja"]
      - args: ["ninja", "install"]
        environ:
          DESTDIR: "@THIS_COLLECT_DIR@"
